{% extends 'students/base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card">
            <div class="card-header py-3" style="background: linear-gradient(135deg, #1a73e8, #0d47a1);">
                <h5 class="mb-0 text-white fw-bold">
                    <i class="bi {% if 'Edit' in title %}bi-pencil-square{% else %}bi-person-plus-fill{% endif %} me-2"></i>
                    {{ title }}
                </h5>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold text-secondary small text-uppercase">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                        <div class="text-danger small mt-1">
                            <i class="bi bi-exclamation-circle me-1"></i>{{ field.errors|join:", " }}
                        </div>
                        {% endif %}
                    </div>
                    {% endfor %}
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary fw-semibold">
                            <i class="bi bi-check-circle me-1"></i>Save Student
                        </button>
                        <a href="{% url 'student_list' %}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left me-1"></i>Back to List
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
