{% extends 'students/base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="card border-0">
            <div class="card-header bg-danger py-3">
                <h5 class="mb-0 text-white fw-bold">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>Confirm Delete
                </h5>
            </div>
            <div class="card-body p-4 text-center">
                <div class="mb-3">
                    <i class="bi bi-person-x-fill text-danger" style="font-size: 3rem;"></i>
                </div>
                <p class="mb-1">You are about to delete:</p>
                <h5 class="fw-bold text-dark">{{ student.name }}</h5>
                <p class="text-muted small mb-4">{{ student.email }} &bull; Age {{ student.age }} &bull; Grade {{ student.grade }}</p>
                <p class="text-danger small mb-4"><i class="bi bi-info-circle me-1"></i>This action cannot be undone.</p>
                <form method="post" class="d-grid gap-2">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger fw-semibold">
                        <i class="bi bi-trash-fill me-1"></i>Yes, Delete
                    </button>
                    <a href="{% url 'student_list' %}" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left me-1"></i>Cancel
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
