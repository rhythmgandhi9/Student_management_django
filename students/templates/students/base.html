<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4f8; min-height: 100vh; }
        .navbar { background: linear-gradient(135deg, #1a73e8, #0d47a1); box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .navbar-brand { font-size: 1.3rem; letter-spacing: 0.5px; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .card-header { border-radius: 12px 12px 0 0 !important; }
        .btn { border-radius: 8px; }
        .table thead th { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; }
        footer { font-size: 0.82rem; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark px-4 py-3">
    <a class="navbar-brand fw-bold" href="/"><i class="bi bi-mortarboard-fill me-2"></i>Student Management</a>
    <a href="{% url 'student_add' %}" class="btn btn-light btn-sm fw-semibold">
        <i class="bi bi-plus-circle me-1"></i>Add Student
    </a>
</nav>

<div class="container mt-4 mb-5">
    {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
</div>

<footer class="text-center text-muted py-3 border-top bg-white">
    &copy; 2025 Student Management System
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
